excluded:
  - Sources/BuildInfo.swift  # 自動生成ファイル
  - .build
  - .swiftpm

opt_in_rules:
  - array_init
  - closure_end_indentation
  - empty_count
  - explicit_init
  - first_where
  - sorted_imports
  - unneeded_parentheses_in_closure_argument

disabled_rules:
  - trailing_whitespace  # .editorconfig で管理

function_body_length:
  warning: 200
  error: 250

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 600
