name: CI

on:
  # pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Create BuildInfo stub
        run: printf 'enum BuildInfo { static let version = "dev" }\n' > Sources/BuildInfo.swift

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -scheme VideoWallpaper \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Test
        run: |
          xcodebuild test \
            -scheme VideoWallpaper \
            -destination 'platform=macOS'
