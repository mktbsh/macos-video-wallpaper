name: バグ報告
description: バグや不具合を報告する
title: "fix: "
labels: ["bug"]
body:
  - type: input
    id: macos-version
    attributes:
      label: macOS バージョン
      placeholder: "例: macOS 15.2"
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: アプリバージョン
      placeholder: "例: v0.0.1"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: スクリーンショット
      description: あれば添付してください
